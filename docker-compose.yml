services:
    web:
        build:
            context: .
            dockerfile: docker/Dockerfile
        image: generador-contrasena:latest
        ports:
            - "8000:8000"
        env_file:
            - .env
        environment:
            DJANGO_SETTINGS_MODULE: settings.production
        volumes:
            - app-data:/app/data
        read_only: true
        tmpfs:
            - /tmp:size=16m
        security_opt:
            - no-new-privileges:true
        cap_drop:
            - ALL
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz/"]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 15s

volumes:
    app-data:
